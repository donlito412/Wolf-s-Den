name: Build Howling Wolves 2.0

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-mac:
    name: macOS (AU + VST3 + Standalone)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Package VST3
        run: |
          mkdir -p packaging/mac
          cp -r "build/WolfsDen_artefacts/Release/VST3/Howling Wolves 2.0.vst3" packaging/mac/

      - name: Package AU
        run: |
          cp -r "build/WolfsDen_artefacts/Release/AU/Howling Wolves 2.0.component" packaging/mac/

      - name: Package Standalone
        run: |
          cp -r "build/WolfsDen_artefacts/Release/Standalone/Howling Wolves 2.0.app" packaging/mac/

      - name: Create macOS ZIP
        run: |
          cd packaging/mac
          zip -r "../../Howling-Wolves-2.0-macOS.zip" .

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Howling-Wolves-2.0-macOS
          path: Howling-Wolves-2.0-macOS.zip
          retention-days: 30

      - name: Upload to Release (if release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Howling-Wolves-2.0-macOS.zip

  build-windows:
    name: Windows (VST3 + Standalone)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Package VST3
        run: |
          mkdir -p packaging/win
          Copy-Item -Recurse "build\WolfsDen_artefacts\Release\VST3\Howling Wolves 2.0.vst3" packaging\win\
        shell: pwsh

      - name: Package Standalone
        run: |
          Copy-Item -Recurse "build\WolfsDen_artefacts\Release\Standalone\Howling Wolves 2.0.exe" packaging\win\ -ErrorAction SilentlyContinue
          Copy-Item -Recurse "build\WolfsDen_artefacts\Release\Standalone\" packaging\win\Standalone -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Create Windows ZIP
        run: |
          Compress-Archive -Path "packaging\win\*" -DestinationPath "Howling-Wolves-2.0-Windows.zip"
        shell: pwsh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Howling-Wolves-2.0-Windows
          path: Howling-Wolves-2.0-Windows.zip
          retention-days: 30

      - name: Upload to Release (if release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Howling-Wolves-2.0-Windows.zip
